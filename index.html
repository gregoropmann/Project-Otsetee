<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Otset.ee</title>
    <link class="fluid" rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#4F77AA">
    <meta name="description" content="Otset.ee - Otsetee värske toiduni. Leia kaardilt kohalikud teeäärsed müüjad, värsked maamunad, mesi, marjad ja aiasaadused otse tootjalt.">
    <meta name="keywords" content="otsetee, kohalik toit, värsked munad, maamunad, mesi, otse tootjalt, omatoodang, teeäärne müük">
    <meta name="robots" content="index, follow">

    <meta property="og:title" content="Otset.ee - Otsetee värske toiduni">
    <meta property="og:description" content="Leia kaardilt kohalikud müüjad ja värske kodumaine kraam otse tee äärest.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://gregoropmann.github.io/otsetee/">

    <meta name="google-site-verification" content="evLh_s8NUTBzcndfoJ3MNhBJH9SNUV_10m8ROfrUezM" />

    <link rel="icon" type="image/png" href="assets/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="shortcut icon" href="assets/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Otsetee" />
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <div id="login-view" class="view active">
        <div class="login-card">
            <div class="brand-title">otset.ee</div>

            <div class="brand-subtitle" id="brand-subtitle">Otsetee värske toiduni maanteel</div>

            <script>
              const slogans = [
                "Otseteel ei leia Sa kunagi reklaame",
                "Sinu otsetee maitsva vahepalani",
                "Otsetee värske toiduni maanteel",
                "Otsetee — Kvaliteetne kaup ilma viivituseta",
                "Parim otsetee tühjale kõhule",
                "otsetee, otsetee, otseteed, otseteesse, otseteest, otsetees, otseteele, otseteel, otseteelt, otseteeks, otseteeni, otseteena, otseteeta, otseteega", 
                "Otsetee on Coop-ist kohalikum"
              ];

              const randomSlogan = slogans[Math.floor(Math.random() * slogans.length)];
              document.getElementById("brand-subtitle").textContent = randomSlogan;
            </script>
      
            <button class="oauth-btn" onclick="handleLogin('merchant', 'Google')">
                <span>Müüja: Google konto</span>
            </button>
            <button class="oauth-btn apple" onclick="handleLogin('merchant', 'Apple')">
                <span>Müüja: Apple konto</span>
            </button>
            <div class="divider">või siseneda sirvimiseks</div>
            <button class="oauth-btn buyer" onclick="handleLogin('buyer', 'Sõitja')">
                <span>Sisene Ostjana (Vaata Kaarti)</span>
            </button>
            <div style="margin-top: 25px; text-align: center;">
                <a href="my-data.html" style="color: #777; font-size: 0.85rem; text-decoration: underline;">
                    Kuidas me Sinu andmeid kaitseme?
                </a>
            </div>
            <div style="margin-top: 25px; text-align: center;">
                <a href="https://buymeacoffee.com/gregoropmann" style="color: #777; font-size: 0.85rem; text-decoration: underline;">
                    Toeta Otseteed
                </a>
            </div>
            <div style="margin-top: 25px; text-align: center;">
                <a href="https://www.facebook.com/profile.php?id=61591269020274" style="color: #777; font-size: 0.85rem; text-decoration: underline;">
                    Tagasiside
                </a>
            </div>
        </div>
    </div>

    <div id="map-view" class="view">
        <div class="search-container">
            <input type="text" id="location-search" class="search-bar" placeholder="Otsi asukohta või teeotsa..." onkeypress="handleSearch(event)">
            
            <div class="quick-filters" id="quick-filters-container"></div>
        </div>

        <div id="map-container"></div>
        <div class="custom-zoom-controls">
            <button class="zoom-btn" onclick="mapZoomIn()">+</button>
            <button class="zoom-btn" onclick="mapZoomOut()">−</button>
        </div>
        <div class="map-overlay">
            <div class="action-bar">
                <button id="action-btn" class="btn btn-accent" onclick="handleActionBarClick()">Alusta Müüki</button>
                <button id="stock-btn" class="btn btn-warning" style="display: none;" onclick="toggleStockState()">Kaup OTSAS</button>
                <button id="verify-btn" class="btn btn-accent" style="display: none; background-color: #E5A93C; color: white;" onclick="askForSupportAndVerify()">⭐ Tõsta usaldusväärsust</button>
                <button id="edit-products-btn" class="btn btn-primary" style="display: none;" onclick="switchView('product-selection-view')">Seaded</button>
                <button class="btn btn-primary" style="flex: 0.6; min-width: 70px;" onclick="handleLogout()">Logi välja</button>
            </div>
        </div>
    </div>

    <div id="product-selection-view" class="view">
        <div class="section-title">
            <span>Müügikoha Seaded</span>
            <button class="btn btn-primary" style="padding: 6px 12px; font-size: 0.85rem; flex: none;" onclick="switchView('map-view')">Tagasi</button>
        </div>
        <div class="meta-settings-card">
            <div class="meta-input-group" style="margin-top: 15px; display: flex; flex-direction: column; gap: 8px;">
                <label style="font-weight: 600; font-size: 0.9rem; color: var(--text-charcoal);">Müügikoha/Poe nimi kaardil:</label>
                <div style="display: flex; gap: 15px; align-items: center; margin-bottom: 5px;">
                    <label style="display: flex; align-items: center; gap: 5px; font-size: 0.9rem; cursor: pointer;">
                        <input type="radio" name="name_type" value="google" checked onchange="toggleShopNameField()"> Google nimega
                    </label>
                    <label style="display: flex; align-items: center; gap: 5px; font-size: 0.9rem; cursor: pointer;">
                        <input type="radio" name="name_type" value="custom" onchange="toggleShopNameField()"> Eriprojekt/Erimi
                    </label>
                </div>
                <input type="text" id="merchant-custom-name" class="form-input" placeholder="Sisesta oma poe/talu unikaalne nimi" style="display: none; width: 100%; box-sizing: border-box; margin-bottom: 5px;">
            </div>

            <div class="meta-input-group">
                <label>Müügi tüüp:</label>
                <div style="display: flex; gap: 15px; margin-top: 4px;">
                    <label style="display: flex; align-items: center; gap: 5px; font-size: 0.9rem; cursor: pointer;">
                        <input type="radio" name="sale_type" value="temporary" checked onchange="toggleMetaFields()"> Hetkel tee ääres (Mobiilne)
                    </label>
                    <label style="display: flex; align-items: center; gap: 5px; font-size: 0.9rem; cursor: pointer;">
                        <input type="radio" name="sale_type" value="permanent" onchange="toggleMetaFields()"> Püsiv asukoht (Talu/Kodu)
                    </label>
                </div>
            </div>

            <div class="meta-input-group" style="margin-top: 12px;">
                <label style="font-weight: 600; font-size: 0.9rem; color: var(--text-charcoal); display: block; margin-bottom: 6px;">Toetatud makseviisid (Vali üks või mitu):</label>
                <div style="display: flex; flex-direction: column; gap: 8px; margin-top: 4px;">
                    <label style="display: flex; align-items: center; gap: 8px; font-size: 0.95rem; cursor: pointer; user-select: none;">
                        <input type="checkbox" name="payment_method" value="cash" style="width: 18px; height: 18px;">
                        Sularaha (Cash)
                    </label>
                    <label style="display: flex; align-items: center; gap: 8px; font-size: 0.95rem; cursor: pointer; user-select: none;">
                        <input type="checkbox" name="payment_method" value="card" style="width: 18px; height: 18px;">
                        Kaardimakse (Card)
                    </label>
                    <label style="display: flex; align-items: center; gap: 8px; font-size: 0.95rem; cursor: pointer; user-select: none;">
                        <input type="checkbox" name="payment_method" value="transfer" style="width: 18px; height: 18px;">
                        Pangaülekanne (Transfer)
                    </label>
                </div>
            </div>

            <div id="permanent-only-fields" style="display: none; flex-direction: column; gap: 10px; margin-top: 12px; border-top: 1px dashed #ccc; padding-top: 10px;">
                <div>
                    <label style="font-size: 0.85rem; font-weight: bold; color: #555;">Kontakttelefon (Kuvatakse kaardil):</label>
                    <input type="tel" id="merchant-phone" class="form-input" placeholder="nt. +372 5555 5555" style="width: 100%; margin-top: 4px; padding: 6px; box-sizing: border-box;">
                </div>
                <div>
                    <label style="font-size: 0.85rem; font-weight: bold; color: #555;">Lahtiolekuajad või info (Püsikohtadele):</label>
                    <input type="text" id="merchant-hours" class="form-input" placeholder="nt. E-P 09:00-19:00 või 'Helista ette!'" style="width: 100%; margin-top: 4px; padding: 6px; box-sizing: border-box;">
                </div>
            </div>
        </div>

        <div style="padding: 0 10px; margin-bottom: 10px;">
            <button class="btn btn-accent" style="width: 100%; padding: 12px; font-size: 1rem; font-weight: bold;" onclick="confirmProductsAndStartGeo()">Salvesta Seaded & Alusta Müüki</button>
        </div>

        <div id="catalog-container" style="padding-bottom: 20px;"></div>
    </div>

    <div id="app-notification" class="notification-toast">
        <div id="notification-content"></div>
        <div id="notification-buttons" class="notification-btn-area"></div>
    </div>

    <div id="report-modal" class="modal-backdrop" style="display: none;">
        <div class="modal-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 8px;">
                <h3 id="report-modal-title" style="margin: 0; font-size: 1.1rem; color: #c62828;">Teata probleemist</h3>
                <button onclick="closeReportModal()" style="background: none; border: none; font-size: 1.4rem; cursor: pointer; color: #999;">&times;</button>
            </div>
            
            <div class="form-group" style="margin-bottom: 12px;">
                <label style="font-size: 0.85rem; font-weight: bold; color: #2C2A29;">Miks Sa sellest kohast teatad? *</label>
                <textarea id="report-reason" class="form-input" placeholder="nt. Müüjat pole kohal, kaup on otsas, vale asukoht teel..." style="width: 100%; height: 70px; resize: none; margin-top: 4px; font-size: 0.9rem; padding: 5px; box-sizing: border-box;\"></textarea>
            </div>

            <div class="form-group" style="margin-bottom: 20px;">
                <label style="font-size: 0.85rem; font-weight: bold; color: #2C2A29;">Sinu kontakt (telefon/meil) (Vabatahtlik):</label>
                <input type="text" id="report-contact" class="form-input" placeholder="Et saaksime täpsustada" style="width: 100%; margin-top: 4px; font-size: 0.9rem; padding: 5px; box-sizing: border-box;\">
            </div>

            <div style="display: flex; gap: 10px; justify-content: center;">
                <button class="btn btn-danger" style="flex: 1; background-color: #D9534F; color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer;" id="submit-report-btn">Saada teade</button>
                <button class="btn btn-primary" style="flex: 1; background-color: #ccc; color: #333; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer;" onclick="closeReportModal()">Tühista</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
