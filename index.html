<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Otset.ee</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#4F77AA">
    <link rel="icon" type="image/png" href="assets/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="shortcut icon" href="assets/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Otsetee" />
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <div id="login-view" class="view active">
        <div class="login-card">
            <div class="brand-title">otset.ee</div>
            <div class="brand-subtitle">Otsetee värske toiduni maanteel</div>      
            <button class="oauth-btn" onclick="handleLogin('merchant', 'Google')">
                <span>Müüja: Google konto</span>
            </button>
            <button class="oauth-btn apple" onclick="handleLogin('merchant', 'Apple')">
                <span>Müüja: Apple konto</span>
            </button>
            <div class="divider">või siseneda sirvimiseks</div>
            <button class="oauth-btn buyer" onclick="handleLogin('buyer', 'Sõitja')">
                <span>Sisene Ostjana (Vaata Kaarti)</span>
            </button>
        </div>
    </div>
    <div id="map-view" class="view">
        <div class="search-container">
            <input type="text" id="location-search" class="search-bar" placeholder="Otsi asukohta või teeotsa..." onkeypress="handleSearch(event)">
        </div>
        <div id="map-container"></div>
        <div class="custom-zoom-controls">
            <button class="zoom-btn" onclick="mapZoomIn()">+</button>
            <button class="zoom-btn" onclick="mapZoomOut()">−</button>
        </div>
        <div class="map-overlay">
            <div class="action-bar">
                <button id="action-btn" class="btn btn-accent" onclick="handleActionBarClick()">Alusta Müüki</button>
                <button id="stock-btn" class="btn btn-warning" style="display: none;" onclick="toggleStockState()">Kaup OTSAS</button>
                <button id="edit-products-btn" class="btn btn-primary" style="display: none;" onclick="switchView('product-selection-view')">Seaded</button>
                <button class="btn btn-primary" style="flex: 0.6; min-width: 70px;" onclick="handleLogout()">Logi välja</button>
            </div>
        </div>
    </div>
    <div id="product-selection-view" class="view">
        <div class="section-title">
            <span>Müügikoha Seaded</span>
            <button class="btn btn-primary" style="padding: 6px 12px; font-size: 0.85rem; flex: none;" onclick="switchView('map-view')">Tagasi</button>
        </div>
        <div class="meta-settings-card">
            <div class="form-group">
                <label>Müügikoha tüüp:</label>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="sale_type" value="temporary" checked onchange="toggleMetaFields()"> Välkmüük (Live kohapeal)
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="sale_type" value="permanent" onchange="toggleMetaFields()"> Püsikoht (Talu, Kiosk)
                    </label>
                </div>
            </div>
            <div id="permanent-only-fields" style="display: none; flex-direction: column; gap: 12px;">
                <div class="form-group">
                    <label for="merchant-phone">Kontakttelefon (Tellimiseks):</label>
                    <input type="text" id="merchant-phone" class="form-input" placeholder="nt. +372 555 XXXXX">
                </div>
                <div class="form-group">
                    <label for="merchant-hours">Lahtiolekuajad / Info:</label>
                    <input type="text" id="merchant-hours" class="form-input" placeholder="nt. E-P 9-18 või Iseteenindus 24/7">
                </div>
            </div>
        </div>
        <div id="catalog-container"></div>
        <div class="sticky-footer">
            <button class="btn btn-accent" style="width: 100%;" onclick="confirmProductsAndStartGeo()">Kinnita andmed ja aktiveeri kaardil</button>
        </div>
    </div>
    <div id="app-notification" class="notification-container">
        <div id="notification-content" class="notification-text">Teavitus</div>
        <div id="notification-buttons" class="notification-actions"></div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
